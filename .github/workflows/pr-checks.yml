name: PR Checks

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: pr-checks-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: ESLint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run lint

    format:
        name: Prettier
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run format:check

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run build

    audit:
        name: npm audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm audit --audit-level=high

    dependency-review:
        name: Dependency Review
        # Only runs on pull requests; compares the PR's dependency changes.
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/dependency-review-action@v4
              with:
                  fail-on-severity: high
