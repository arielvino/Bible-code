name: Deploy Preview

on:
  push:
    branches-ignore: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Build
        working-directory: source
        run: |
          npm ci
          npm run build

      - name: Compute slug
        id: slug
        run: |
          echo "value=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Sync built site to preview directory
        run: |
          SLUG="${{ steps.slug.outputs.value }}"
          mkdir -p gh-pages/preview/$SLUG
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            source/dist/ gh-pages/preview/$SLUG/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview/$SLUG
          git diff --staged --quiet || git commit -m "Preview: ${{ github.ref_name }} @ ${{ github.sha }}"
          git push

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.slug.outputs.value }}"
          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head '${{ github.ref_name }}' \
            --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)/preview/$SLUG/"
            BODY="**Preview deployment:** $URL"
            gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY" --edit-last 2>/dev/null || \
            gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
          fi
