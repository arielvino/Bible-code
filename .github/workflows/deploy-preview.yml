name: Deploy Preview

on:
    push:
        branches-ignore: [main]

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: gh-pages
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Build
              run: |
                  npm ci
                  npm run build

            - name: Compute slug
              id: slug
              run: |
                  echo "value=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

            - name: Publish built site to preview directory
              run: |
                  SLUG="${{ steps.slug.outputs.value }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Publish with a retry loop. The `gh-pages` branch is shared by
                  # every branch's preview deploy, so a plain push can lose a race
                  # against a concurrent deploy and leave the tree inconsistent
                  # (e.g. one build's index.html next to another build's assets).
                  # Each attempt re-syncs onto the *latest* gh-pages and only ever
                  # rewrites this branch's own preview/<slug>/, so a rejected push
                  # just retries cleanly on top of whatever else landed.
                  published=0
                  for attempt in 1 2 3 4 5; do
                    git worktree remove --force gh-pages 2>/dev/null || true
                    rm -rf gh-pages
                    git worktree prune

                    if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
                      git fetch origin gh-pages
                      git worktree add -B gh-pages gh-pages origin/gh-pages
                    else
                      git worktree add --detach gh-pages
                      git -C gh-pages checkout --orphan gh-pages
                      git -C gh-pages rm -rf . >/dev/null 2>&1 || true
                    fi

                    mkdir -p gh-pages/preview/$SLUG
                    rsync -av --delete \
                      --exclude='.git' \
                      dist/ gh-pages/preview/$SLUG/

                    git -C gh-pages add -A
                    if git -C gh-pages diff --staged --quiet; then
                      published=1
                      break
                    fi
                    git -C gh-pages commit -m "Preview: ${{ github.ref_name }} @ ${{ github.sha }}"
                    if git -C gh-pages push origin gh-pages; then
                      published=1
                      break
                    fi
                    echo "gh-pages advanced under us; retrying in $((attempt * 3))s"
                    sleep $((attempt * 3))
                  done

                  git worktree remove --force gh-pages 2>/dev/null || true
                  if [ "$published" != "1" ]; then
                    echo "Failed to publish preview after retries" >&2
                    exit 1
                  fi

            - name: Comment preview URL on PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SLUG="${{ steps.slug.outputs.value }}"
                  PR=$(gh pr list \
                    --repo "${{ github.repository }}" \
                    --head '${{ github.ref_name }}' \
                    --json number --jq '.[0].number // empty')
                  if [ -n "$PR" ]; then
                    URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)/preview/$SLUG/"
                    BODY="**Preview deployment:** $URL"
                    gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY" --edit-last 2>/dev/null || \
                    gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
                  fi
